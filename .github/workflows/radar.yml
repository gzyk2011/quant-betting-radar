name: Quant Betting Radar

on:
  schedule:
    # 定时任务：每周五和周六的 UTC 时间上午 10:00 执行扫描
    # 此时博彩公司赔率最稳，且大部分英冠比赛首发即将或已经公布
    - cron: '0 */12 * * *'
  workflow_dispatch: # 允许你在网页上手动点击运行

jobs:
  scan-value-bets:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 升级到 v4 以支持最新的 Node.js 环境

      - name: 设置 Python 环境
        uses: actions/setup-python@v5 # 升级到 v5 以消除弃用警告
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存，让下次运行速度飞快

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行雷达扫描
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 强制使用最新的 Node 运行环境
        run: |
          python radar_bot.py
